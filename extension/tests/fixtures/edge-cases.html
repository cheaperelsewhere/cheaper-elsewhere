<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Edge cases - DOM clobbering and SVG</title>
</head>
<body>
  <!-- Shopify's standard variant-picker pattern: <select name="id"> inside a
       <form> DOM-clobbers form.id to the <select> element instead of a string. -->
  <form>
    <select name="id">
      <option>Small</option>
      <option>Medium</option>
    </select>
    <div class="countdown-banner">Offer ends in 00:10:00 - hurry!</div>
  </form>

  <!-- SVGElement.className is an SVGAnimatedString, not a plain string. -->
  <svg id="timer-icon" class="countdown-icon" width="24" height="24">
    <circle cx="12" cy="12" r="10"></circle>
  </svg>
</body>
</html>
