<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>CSS-module-driven strikethrough, no semantic tag or inline style</title>
  <style>
    /* Mimics a hashed CSS-module class name, e.g. AliExpress's
       "price-default--original--CWcHOit" - the rule that actually crosses
       out the price lives here, not on the element via inline style. */
    .price-original-hash7f3 {
      text-decoration: line-through;
    }
  </style>
</head>
<body>
  <h1>Wireless Earbuds Pro</h1>
  <p>
    <span class="price-original-hash7f3"><bdi>$129.99</bdi></span>
    <strong>$89.99</strong>
  </p>
</body>
</html>
