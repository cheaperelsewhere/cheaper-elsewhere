name = "shopper-protection-ebay-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"

[vars]
# Production eBay API. Calls are real and affiliate-tracked via EBAY_CAMPAIGN_ID.
# EBAY_APP_ID, EBAY_CERT_ID, and EBAY_CAMPAIGN_ID must be set in .dev.vars (local)
# or as Worker secrets (deployed) — see .dev.vars.example.
EBAY_API_BASE_URL = "https://api.ebay.com"
